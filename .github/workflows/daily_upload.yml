name: Archive of Enigmas - Daily Upload v6

on:
  schedule:
    - cron: '30 12 * * *'   # 6:00 PM IST
    - cron: '30 3 * * *'    # 9:00 AM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation imagemagick

      - name: Fix ImageMagick policy
        run: |
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore upload history
        uses: actions/cache@v4
        with:
          path: upload_history.json
          key: upload-history-${{ github.run_id }}
          restore-keys: |
            upload-history-

      - name: Run Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          python bot.py

      - name: Save upload history
        uses: actions/cache@v4
        with:
          path: upload_history.json
          key: upload-history-${{ github.run_id }}
