name: Archive of Enigmas - Daily Upload v9

on:
  schedule:
    - cron: '30 12 * * *'   # 6:00 PM IST
    - cron: '30 3 * * *'    # 9:00 AM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # ─────────────────────────────────────────────────────────
    # 150 min: ~10 min setup + ~90 min video render + 50 min buffer
    # Rendering a 20-min 1080p video in MoviePy takes 60-90 min
    # on a 2-core GitHub runner. Don't go below 120.
    # ─────────────────────────────────────────────────────────
    timeout-minutes: 150

    steps:
      # ── 1. CHECKOUT ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SWAP SPACE — most critical fix ──────────────────
      # GitHub runners have 7 GB RAM. MoviePy + 1080p video
      # assembly peaks at 10–14 GB. Without swap the OOM killer
      # silently terminates the runner ("lost communication").
      # 8 GB swap gives us ~15 GB total virtual memory.
      - name: Add 8 GB swap space
        run: |
          # GitHub runners sometimes pre-create /swapfile (already busy).
          # Use a different path and dd, which works on any filesystem.
          SWAP=/mnt/swapfile-bot
          if ! swapon --show | grep -q "$SWAP"; then
            sudo dd if=/dev/zero of=$SWAP bs=1M count=8192 status=none
            sudo chmod 600 $SWAP
            sudo mkswap $SWAP -q
            sudo swapon $SWAP
            echo "✅ 8 GB swap added at $SWAP"
          else
            echo "✅ Swap already active — skipping"
          fi
          free -h

      # ── 3. PYTHON ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. SYSTEM DEPENDENCIES ─────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core \
            imagemagick \
            --no-install-recommends
          ffmpeg -version | head -1

      # ── 5. FIX IMAGEMAGICK POLICY ──────────────────────────
      - name: Fix ImageMagick policy
        run: |
          sudo sed -i \
            's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' \
            /etc/ImageMagick-6/policy.xml || true

      # ── 6. PYTHON DEPENDENCIES (cached) ────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q
          echo "✅ Dependencies installed"

      # ── 7. RESTORE UPLOAD HISTORY ──────────────────────────
      - name: Restore upload history
        uses: actions/cache@v4
        with:
          path: upload_history.json
          key: upload-history-${{ github.run_id }}
          restore-keys: |
            upload-history-

      # ── 8. PRE-RUN DIAGNOSTICS ─────────────────────────────
      - name: System resources before run
        run: |
          echo "=== Memory ===" && free -h
          echo "=== Disk ===" && df -h /
          echo "=== CPU ===" && nproc
          echo "=== Swap ===" && swapon --show

      # ── 9. RUN BOT ─────────────────────────────────────────
      # EXTRA_LANGUAGES is deliberately forced to empty here.
      # Multi-language runs (6 extra pipelines) would exceed the
      # 150-min timeout. Schedule separate workflows per language
      # or run them manually via workflow_dispatch.
      - name: Run Bot
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:         ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRETS:  ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN:           ${{ secrets.YOUTUBE_TOKEN }}
          # Caps Python's memory allocator — helps GC reclaim sooner
          MALLOC_TRIM_THRESHOLD_:  "131072"
          PYTHONUNBUFFERED:        "1"
        run: |
          # Patch EXTRA_LANGUAGES to [] at runtime so we never try
          # to run 7 full pipelines inside one 150-min job
          python - << 'PYEOF'
          import config
          config.EXTRA_LANGUAGES = []
          PYEOF

          # Run with low-priority CPU scheduling so the OS never
          # starves the GitHub runner heartbeat thread
          nice -n 10 python bot.py

      # ── 10. POST-RUN DIAGNOSTICS ───────────────────────────
      - name: System resources after run
        if: always()
        run: |
          echo "=== Memory ===" && free -h
          echo "=== Disk ===" && df -h /
          echo "=== Output files ===" && ls -lh output/ 2>/dev/null || echo "(no output dir)"

      # ── 11. CLEAN UP LARGE FILES ───────────────────────────
      # Free disk so the cache step doesn't fail on a full runner
      - name: Clean up output folder
        if: always()
        run: |
          rm -rf output/images output/videos output/voiceover*.mp3 \
                 output/bgmusic.mp3 output/edge_chunk_*.mp3 || true
          echo "✅ Temp files removed"

      # ── 12. SAVE UPLOAD HISTORY ────────────────────────────
      - name: Save upload history
        if: always()
        uses: actions/cache@v4
        with:
          path: upload_history.json
          key: upload-history-${{ github.run_id }}
