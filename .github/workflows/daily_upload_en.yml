name: Archive of Enigmas - English (Daily)

on:
  schedule:
    # v11: Post at 14:00 UTC = 2 PM EST / 9:30 PM IST
    # Research shows true crime audience peaks on YouTube between 2-4 PM EST
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  upload-english:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Add 8 GB swap
        run: |
          SWAP=/mnt/swapfile-bot
          if ! swapon --show | grep -q "$SWAP"; then
            sudo dd if=/dev/zero of=$SWAP bs=1M count=8192 status=none
            sudo chmod 600 $SWAP && sudo mkswap $SWAP -q && sudo swapon $SWAP
          fi
          free -h

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core imagemagick --no-install-recommends
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - run: pip install --upgrade pip -q && pip install -r requirements.txt -q

      # v11 FIX: Persistent upload history using GitHub Actions cache
      # The cache key changes each run so new run always saves fresh history
      - uses: actions/cache@v4
        with:
          path: upload_history.json
          key: upload-history-en-${{ github.run_id }}
          restore-keys: upload-history-en-

      - name: Run Bot (English)
        env:
          BOT_LANGUAGE:            "en"
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:         ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_SECRETS:  ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN:           ${{ secrets.YOUTUBE_TOKEN }}
          MALLOC_TRIM_THRESHOLD_:  "131072"
          PYTHONUNBUFFERED:        "1"
        run: nice -n 10 python bot.py

      - name: Cleanup
        if: always()
        run: rm -rf output/images output/videos output/voiceover*.mp3 output/bgmusic.mp3 output/edge_chunk_*.mp3 || true

      - uses: actions/cache@v4
        if: always()
        with:
          path: upload_history.json
          key: upload-history-en-${{ github.run_id }}
